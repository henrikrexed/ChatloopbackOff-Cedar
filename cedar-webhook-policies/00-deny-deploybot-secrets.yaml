apiVersion: cedar.k8s.aws/v1alpha1
kind: Policy
metadata:
  name: deny-deploybot-secrets
  annotations:
    cedar.k8s.aws/description: >-
      Scenario A headline — Cedar denies what RBAC only grants. The deploy-bot
      ServiceAccount has RBAC to manage workloads but must never read Secrets.
spec:
  # enforced:false = load the policy without validating it against the
  # cluster-generated Cedar schema. Flip to true once the schema for THIS
  # cluster is generated (see ../cedar-webhook-policies/README.md).
  validation:
    enforced: false
  content: |
    // SCENARIO A (headline beat): RBAC is allow-only and cannot express a deny.
    // 'deploy-bot' is granted broad workload permissions by RBAC, but Cedar is
    // ordered BEFORE RBAC in the apiserver (Webhook(cedar) -> Node -> RBAC), so
    // this forbid wins even though RBAC would allow the read.
    //
    // BLAST-RADIUS CONTAINMENT: the forbid is bounded to the demo namespace
    // (resource.namespace == "cedar-tinytodo"). It is therefore STRUCTURALLY
    // unable to deny anything in kube-system or any cluster-scoped request — a
    // cluster-wide `list secrets` carries no namespace, doesn't match, and falls
    // through to Node/RBAC as NoOpinion. See README "Limiting forbid blast radius".
    forbid (
        principal is k8s::ServiceAccount,
        action in [k8s::Action::"get", k8s::Action::"list", k8s::Action::"watch"],
        resource is k8s::Resource
    ) when {
        principal.name == "deploy-bot" &&
        resource.resource == "secrets" &&
        resource.apiGroup == "" &&
        resource has namespace &&
        resource.namespace == "cedar-tinytodo"
    };
