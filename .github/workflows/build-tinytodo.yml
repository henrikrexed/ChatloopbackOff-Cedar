name: build-tinytodo

# Builds and publishes the ACT 1 TinyTodo images for the ChatLoopBackOff
# "Cedar on Kubernetes" livestream demo, mirroring build-cedar-webhook.yml.
#
#   ghcr.io/henrikrexed/tinytodo-server:dev  <- app/server (Python stdlib HTTP server)
#   ghcr.io/henrikrexed/tinytodo-client:dev  <- app/client (Python stdlib CLI)
#
# Both are pure Python 3.12 stdlib (no pip deps) -> multi-arch (amd64+arm64) is free.
# Refs/ports must stay matched to deploy/tinytodo-server.yaml + tinytodo-client.yaml.
#
# PACKAGE VISIBILITY: the workload cluster pulls anonymously (no imagePullSecret,
# same as cedar-webhook). GHCR packages are created PRIVATE on first publish and
# GITHUB_TOKEN cannot flip visibility. After the first successful run, set both
# packages to Public once at
#   https://github.com/users/henrikrexed/packages/container/tinytodo-server/settings
#   https://github.com/users/henrikrexed/packages/container/tinytodo-client/settings
# (this is a one-time manual step, exactly like cedar-webhook).

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - app/server/**
      - app/client/**
      - .github/workflows/build-tinytodo.yml

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tinytodo-server
            context: app/server
            image: ghcr.io/henrikrexed/tinytodo-server
          - name: tinytodo-client
            context: app/client
            image: ghcr.io/henrikrexed/tinytodo-client
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ matrix.image }}:dev
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/henrikrexed/ChatloopbackOff-Cedar
