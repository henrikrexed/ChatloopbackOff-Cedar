name: build-cedar-webhook

# Builds the Cedar authorization/admission webhook image for the
# ChatLoopBackOff "Cedar on Kubernetes" livestream demo and publishes it to GHCR.
#
# Source is upstream cedar-policy/cedar-access-control-for-k8s, which was
# ARCHIVED/deprecated on 2025-10-15. We therefore pin to the immutable commit
# SHA 717b3745015f78c80e3d63d83cc97947bd2f4d20 (short: 717b374) and build with
# upstream's own multi-stage Dockerfile (binary cmd/cedar-webhook/main.go,
# ENTRYPOINT /cedar-webhook, EXPOSE 10288/10289).
#
# The resulting image ref MUST stay in lockstep with the CAPI manifest pin in
# proxmox-clusters: clusters/cedar-livestream-demo/control-plane.yaml
#   image: ghcr.io/henrikrexed/cedar-webhook:717b374

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - .github/workflows/build-cedar-webhook.yml

env:
  UPSTREAM_REPO: cedar-policy/cedar-access-control-for-k8s
  UPSTREAM_SHA: 717b3745015f78c80e3d63d83cc97947bd2f4d20
  IMAGE: ghcr.io/henrikrexed/cedar-webhook
  TAG: 717b374

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout upstream at pinned SHA
        uses: actions/checkout@v6
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_SHA }}
          persist-credentials: false

      - name: Bump builder Go base (go.mod@717b374 needs >=1.24.2; upstream Dockerfile pins golang:1.23 with GOTOOLCHAIN=local)
        run: |
          sed -i 's#golang:1.23#golang:1.24#' Dockerfile
          grep '^FROM golang' Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64 — Proxmox nodes are x86_64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
