<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Cedar as a Kubernetes admission webhook: kubectl request to kube-apiserver to Cedar validating webhook, policy evaluation returns allow or deny, the decision emits an OpenTelemetry span">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#142036"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C2738"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="cedar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36C5B0"/>
      <stop offset="100%" stop-color="#1E8E84"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#F5A623"/>
    </marker>
    <marker id="arrowc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#36C5B0"/>
    </marker>
    <marker id="arrowo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#A78BFA"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="120" y="100" font-family="Inter, sans-serif" font-weight="900" font-size="52" fill="#E8ECF2">Cedar as a Kubernetes admission webhook</text>
  <text x="120" y="146" font-family="Inter, sans-serif" font-size="24" fill="#9AB0BD">A write request is validated by a Cedar policy before it is ever persisted &#8212; and every decision emits an OTel span.</text>

  <!-- kubectl -->
  <g transform="translate(120 470)">
    <rect width="190" height="130" rx="12" fill="#0F1A2D" stroke="#9AB0BD" stroke-width="2"/>
    <text x="95" y="56" font-family="JetBrains Mono, monospace" font-size="26" fill="#E8ECF2" text-anchor="middle">kubectl</text>
    <text x="95" y="90" font-family="Inter, sans-serif" font-size="16" fill="#9AB0BD" text-anchor="middle">create Pod</text>
  </g>

  <!-- kube-apiserver -->
  <g transform="translate(380 300)">
    <rect width="640" height="470" rx="14" fill="url(#api)" stroke="#326CE5" stroke-width="3"/>
    <text x="30" y="50" font-family="Inter, sans-serif" font-weight="800" font-size="30" fill="#E8ECF2">kube-apiserver</text>

    <g transform="translate(40 90)">
      <rect width="260" height="96" rx="10" fill="#142036" stroke="#9AB0BD" stroke-width="2"/>
      <text x="130" y="42" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#E8ECF2" text-anchor="middle">AuthN + AuthZ</text>
      <text x="130" y="72" font-family="Inter, sans-serif" font-size="16" fill="#9AB0BD" text-anchor="middle">request is authorized</text>
    </g>

    <g transform="translate(40 220)">
      <rect width="560" height="120" rx="10" fill="#142036" stroke="#36C5B0" stroke-width="3"/>
      <text x="280" y="46" font-family="Inter, sans-serif" font-weight="800" font-size="24" fill="#E8ECF2" text-anchor="middle">Validating Admission</text>
      <text x="280" y="80" font-family="Inter, sans-serif" font-size="18" fill="#9AB0BD" text-anchor="middle">ValidatingWebhookConfiguration routes the</text>
      <text x="280" y="104" font-family="JetBrains Mono, monospace" font-size="17" fill="#36C5B0" text-anchor="middle">AdmissionReview &#8594; Cedar service</text>
    </g>

    <!-- arrow authz -> admission -->
    <g stroke="#F5A623" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <line x1="170" y1="186" x2="170" y2="216"/>
    </g>

    <text x="30" y="430" font-family="Inter, sans-serif" font-size="17" fill="#9AB0BD">If allowed &#8594; object is persisted to etcd. If denied &#8594; 4xx returned to the client.</text>
  </g>

  <!-- arrow kubectl -> apiserver -->
  <g stroke="#F5A623" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="310" y1="500" x2="378" y2="430"/>
  </g>

  <!-- Cedar webhook server -->
  <g transform="translate(1130 360)">
    <rect width="360" height="220" rx="14" fill="#0F1A2D" stroke="#36C5B0" stroke-width="3"/>
    <text x="180" y="50" font-family="Inter, sans-serif" font-weight="800" font-size="24" fill="#E8ECF2" text-anchor="middle">Cedar webhook</text>
    <text x="180" y="80" font-family="Inter, sans-serif" font-size="16" fill="#9AB0BD" text-anchor="middle">evaluate request against policy</text>
    <line x1="24" y1="100" x2="336" y2="100" stroke="#36C5B0" stroke-opacity="0.35" stroke-width="1"/>
    <text x="24" y="132" font-family="JetBrains Mono, monospace" font-size="16" fill="#36C5B0">forbid(principal, action,</text>
    <text x="24" y="156" font-family="JetBrains Mono, monospace" font-size="16" fill="#36C5B0">  resource) unless {</text>
    <text x="24" y="180" font-family="JetBrains Mono, monospace" font-size="16" fill="#36C5B0">  resource has labels.team };</text>
  </g>

  <!-- policy.cedar feeding webhook -->
  <g transform="translate(1130 640)">
    <rect width="360" height="110" rx="14" fill="url(#cedar)"/>
    <text x="180" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="24" fill="#0B1220" text-anchor="middle">policy.cedar</text>
    <text x="180" y="84" font-family="Inter, sans-serif" font-size="17" fill="#0B1220" text-anchor="middle">the rules, loaded at startup</text>
  </g>
  <g stroke="#36C5B0" stroke-width="4" fill="none" marker-end="url(#arrowc)">
    <line x1="1310" y1="640" x2="1310" y2="584"/>
  </g>

  <!-- admission <-> cedar arrows -->
  <g stroke="#36C5B0" stroke-width="4" fill="none" marker-end="url(#arrowc)">
    <line x1="1020" y1="490" x2="1126" y2="460"/>
  </g>
  <text x="1030" y="468" font-family="Inter, sans-serif" font-size="16" fill="#36C5B0">review</text>
  <g stroke="#36C5B0" stroke-width="4" fill="none" marker-end="url(#arrowc)">
    <line x1="1126" y1="520" x2="1020" y2="548"/>
  </g>
  <text x="1030" y="566" font-family="Inter, sans-serif" font-size="16" fill="#36C5B0">allow / deny</text>

  <!-- OTel span output -->
  <g stroke="#A78BFA" stroke-width="4" fill="none" marker-end="url(#arrowo)">
    <line x1="1310" y1="580" x2="1310" y2="600"/>
  </g>
  <!-- span emission line from webhook to collector -->
  <g stroke="#A78BFA" stroke-width="4" fill="none" marker-end="url(#arrowo)" stroke-dasharray="7 5">
    <path d="M1490 470 C 1640 470, 1660 760, 1490 800"/>
  </g>

  <g transform="translate(1130 786)">
    <rect width="640" height="170" rx="14" fill="#1C2738" stroke="#A78BFA" stroke-width="3"/>
    <text x="32" y="52" font-family="Inter, sans-serif" font-weight="800" font-size="24" fill="#E8ECF2">Each decision &#8594; one OTel span</text>
    <text x="32" y="92" font-family="JetBrains Mono, monospace" font-size="17" fill="#C4B5FD">span: cedar.admission.review</text>
    <text x="32" y="120" font-family="JetBrains Mono, monospace" font-size="16" fill="#9AB0BD">attrs: decision=deny &#183; policy.id &#183; principal &#183; reason</text>
    <text x="32" y="148" font-family="Inter, sans-serif" font-size="16" fill="#9AB0BD">&#8594; OTel Collector &#8594; Grafana (decisions/sec, denials, p99)</text>
  </g>

  <!-- legend -->
  <g transform="translate(120 700)">
    <rect width="14" height="14" rx="3" fill="#F5A623"/>
    <text x="24" y="13" font-family="Inter, sans-serif" font-size="17" fill="#E8ECF2">request flow</text>
    <rect x="160" y="0" width="14" height="14" rx="3" fill="#36C5B0"/>
    <text x="184" y="13" font-family="Inter, sans-serif" font-size="17" fill="#E8ECF2">Cedar evaluation</text>
    <rect x="370" y="0" width="14" height="14" rx="3" fill="#A78BFA"/>
    <text x="394" y="13" font-family="Inter, sans-serif" font-size="17" fill="#E8ECF2">OTel telemetry</text>
  </g>

  <text x="1800" y="1030" font-family="Inter, sans-serif" font-size="18" fill="#6E8493" text-anchor="end">Source: ISI-1085 §2 + ISI-1094 flow &#183; isitobservable.com</text>
</svg>
