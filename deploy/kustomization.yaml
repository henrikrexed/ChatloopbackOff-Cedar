apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cedar-tinytodo

resources:
  - namespace.yaml
  - tinytodo-server.yaml
  - tinytodo-client.yaml

# Hash-suffixed so any edit to policies.cedar / the schema produces a new
# ConfigMap name, which rolls the cedar-agent pod and reloads the policy.
# This is what turns "merge a policy PR" into a live decision change on stage.
configMapGenerator:
  - name: cedar-policies
    files:
      - cedar-policies/policies.cedar
      - cedar-policies/tinytodo.cedarschema
