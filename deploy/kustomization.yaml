apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cedar-tinytodo

resources:
  - namespace.yaml
  - tinytodo-server.yaml
  - tinytodo-client.yaml

# Hash-suffixed so any edit to the JSON policies / schema produces a new
# ConfigMap name, which rolls the cedar-agent pod and reloads the policy.
# This is what turns "merge a policy PR" into a live decision change on stage.
# cedar-agent 0.2.2 loads its --policies/--schema files as JSON, so we ship
# the JSON artifacts (not raw .cedar / the human-readable schema).
configMapGenerator:
  - name: cedar-policies
    files:
      - cedar-policies/policies.json
      - cedar-policies/schema.cedarschema.json
