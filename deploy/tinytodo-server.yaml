apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinytodo-server
  labels:
    app.kubernetes.io/name: tinytodo-server
    app.kubernetes.io/part-of: chatloopbackoff-cedar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tinytodo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinytodo-server
    spec:
      # cedar-agent runs as a sidecar in the SAME pod so the Rust server can
      # reach it on 127.0.0.1:8180 (the URL the upstream tinytodo server uses),
      # with no app patch and no Service hop. Policies/schema are mounted from
      # the kustomize-generated cedar-policies ConfigMap; a policy change
      # rotates the ConfigMap hash -> this Deployment rolls -> cedar-agent
      # reloads with the new policy. That is the GitOps demo beat.
      containers:
        - name: cedar-agent
          image: permitio/cedar-agent:0.2.2@sha256:2a7713bce95220eb2ad870ba311f1ae8a4d6e607d13720747d75b96cb0c551ca
          env:
            - name: CEDAR_AGENT_ADDR
              value: "127.0.0.1"
            - name: CEDAR_AGENT_PORT
              value: "8180"
            - name: CEDAR_AGENT_POLICIES
              value: /cedar/policies.cedar
            - name: CEDAR_AGENT_SCHEMA
              value: /cedar/tinytodo.cedarschema
          ports:
            - name: cedar-http
              containerPort: 8180
          volumeMounts:
            - name: cedar-policies
              mountPath: /cedar
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
        - name: tinytodo-server
          image: ghcr.io/henrikrexed/tinytodo-server:dev
          env:
            # Must match the cedar-agent URL the forked server reads (set when
            # the image is built in the "fork TinyTodo source" task).
            - name: CEDAR_AGENT_URL
              value: http://127.0.0.1:8180
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: cedar-policies
          configMap:
            name: cedar-policies
---
apiVersion: v1
kind: Service
metadata:
  name: tinytodo-server
  labels:
    app.kubernetes.io/name: tinytodo-server
spec:
  selector:
    app.kubernetes.io/name: tinytodo-server
  ports:
    - name: http
      port: 8080
      targetPort: http
